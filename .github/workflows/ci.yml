name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required files
        run: |
          test -f index.html
          test -f styles.css
          test -f script.js
          test -f README.md

      - name: Basic HTML sanity check
        run: |
          grep -q "<!DOCTYPE html>" index.html

      - name: Basic JS sanity check
        run: |
          node --check script.js
